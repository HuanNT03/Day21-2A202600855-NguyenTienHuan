name: MLOps Pipeline

on:
  push:
    branches: [main, master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # ---------------------------------------------------------------------------
  # JOB 1 - UNIT TEST
  # Chay unit tests tren du lieu ao (khong can ket noi cloud storage).
  # Neu co bat ky test nao that bai, pipeline dung lai o day va khong tien hanh
  # huan luyen hay trien khai.
  # ---------------------------------------------------------------------------
  test:
    name: Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        # TODO 1: Viet lenh de chay pytest tren thu muc tests/ voi co -v
        run: pytest tests/ -v


  # ---------------------------------------------------------------------------
  # JOB 2 - TRAIN
  # Xac thuc cloud storage, pull du lieu bang DVC, huan luyen mo hinh, upload artifact.
  # Chi chay khi Job 1 (Unit Test) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Authenticate to Cloud Storage
        # TODO 2: Ghi noi dung credentials ra file tam va set bien moi truong xac thuc.
        run: |
          python -c "
          import yaml, os
          creds = yaml.safe_load('''${{ secrets.CLOUD_CREDENTIALS }}''')
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              f.write(f'AWS_ACCESS_KEY_ID={creds[\"aws_access_key_id\"]}\n')
              f.write(f'AWS_SECRET_ACCESS_KEY={creds[\"aws_secret_access_key\"]}\n')
              f.write('AWS_DEFAULT_REGION=ap-southeast-2\n')
          "

      - name: Pull data with DVC
        # TODO 3: Pull cac file du lieu can thiet tu cloud storage bang lenh dvc pull.
        #         Chi pull train_phase1.csv va eval.csv (khong can train_phase2.csv).
        run: dvc pull data/train_phase1.csv.dvc data/eval.csv.dvc

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        # TODO 4: Doc gia tri "accuracy" tu outputs/metrics.json bang Python inline.
        #         Set ket qua thanh output "accuracy" de job deploy co the doc.
        run: |
          ACC=$(python -c "import json; d=json.load(open('outputs/metrics.json')); print(d['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload model to Cloud Storage
        # TODO 5: Su dung cloud SDK de upload models/model.pkl len
        #         <bucket>/models/latest/model.pkl.
        #         Ten bucket lay tu secret CLOUD_BUCKET.
        env:
          CLOUD_BUCKET: ${{ secrets.CLOUD_BUCKET }}
        run: |
          python - <<'EOF'
          import os
          import boto3
          
          bucket_name = os.environ.get("CLOUD_BUCKET")
          s3_client = boto3.client("s3")
          
          s3_client.upload_file(
              "models/model.pkl",
              bucket_name,
              "models/latest/model.pkl"
          )
          print("Model uploaded to S3 successfully.")
          EOF

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json


  # ---------------------------------------------------------------------------
  # JOB 3 - EVAL
  # Kiem tra nguong chat luong (accuracy >= 0.70).
  # Pipeline dung lai o day neu mo hinh chua dat yeu cau.
  # Chi chay khi Job 2 (Train) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        # TODO 6: Doc accuracy tu output cua job train.
        #         Neu accuracy < 0.70, ket thuc voi loi ro rang.
        #         Neu dat nguong, in thong bao va tiep tuc.
        run: |
          python - <<'EOF'
          acc = float("${{ needs.train.outputs.accuracy }}")
          print(f"Evaluation Gate: Model accuracy is {acc:.4f}")
          if acc < 0.70:
              raise SystemExit(f"FAILED: Accuracy {acc:.4f} is under threshold 0.70. Deployment cancelled.")
          print("PASSED: Model quality matches criteria. Deploying...")
          EOF


  # ---------------------------------------------------------------------------
  # JOB 4 - DEPLOY
  # Trien khai len VM qua SSH.
  # Chi chay khi Job 3 (Eval) hoan thanh thanh cong.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copy serve.py to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "src/serve.py"
          target: "/home/${{ secrets.VM_USER }}/"

      - name: SSH deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            # Install Python packages globally on the VM
            sudo pip3 install --break-system-packages pandas numpy scikit-learn joblib fastapi uvicorn boto3
            
            # Restart service mlops-serve tren VM
            sudo systemctl restart mlops-serve
            
            # Wait for server to start and run health check
            echo "Waiting for mlops-serve to start..."
            success=false
            for i in {1..15}; do
              if curl -sf http://localhost:8000/health; then
                echo "Health check passed."
                success=true
                break
              fi
              echo "Server not ready yet, retrying in 2 seconds (attempt $i/15)..."
              sleep 2
            done
            
            if [ "$success" = false ]; then
              echo "Health check failed after 30 seconds! Printing service status and logs:"
              sudo systemctl status mlops-serve --no-pager
              sudo journalctl -u mlops-serve -n 50 --no-pager
              exit 1
            fi
